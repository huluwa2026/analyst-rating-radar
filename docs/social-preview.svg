<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Analyst Rating Radar social preview</title>
  <desc id="description">Open-source Wall Street analyst ratings dashboard for upgrades, downgrades, price targets, and consensus signals.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1512"/>
      <stop offset="0.62" stop-color="#101f1a"/>
      <stop offset="1" stop-color="#153329"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#62d19a" stop-opacity="0"/>
      <stop offset="1" stop-color="#62d19a" stop-opacity="0.32"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#b5d1c4" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1030" cy="318" r="330" fill="#62d19a" opacity="0.025"/>

  <g transform="translate(72 64)">
    <rect width="54" height="54" rx="12" fill="#12251e" stroke="#436a5a"/>
    <circle cx="27" cy="27" r="17" fill="none" stroke="#416c5b" stroke-width="1.8"/>
    <circle cx="27" cy="27" r="9" fill="none" stroke="#416c5b" stroke-width="1.8"/>
    <path d="M27 27 42 18" stroke="#62d19a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="27" cy="27" r="2.8" fill="#f4f0e6"/>
    <text x="72" y="20" fill="#91cdb0" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="2.4">OPEN-SOURCE STOCK RESEARCH</text>
    <text x="72" y="48" fill="#b4c6bd" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">github.com/huluwa2026/analyst-rating-radar</text>
  </g>

  <g transform="translate(72 190)">
    <text fill="#f7f4eb" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="720" letter-spacing="-2.7">Analyst Rating Radar</text>
    <text y="70" fill="#b9c9c1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="450">Wall Street upgrades, downgrades &amp; price targets</text>
    <text y="105" fill="#b9c9c1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="450">— transparent, searchable, without the spin.</text>

    <g transform="translate(0 154)" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="650">
      <rect width="156" height="42" rx="21" fill="#183f31" stroke="#2a684e"/>
      <circle cx="22" cy="21" r="5" fill="#62d19a"/>
      <text x="36" y="27" fill="#d9eee3">Rating changes</text>
      <rect x="170" width="176" height="42" rx="21" fill="#183f31" stroke="#2a684e"/>
      <circle cx="192" cy="21" r="5" fill="#62d19a"/>
      <text x="206" y="27" fill="#d9eee3">Analyst consensus</text>
      <rect x="360" width="177" height="42" rx="21" fill="#183f31" stroke="#2a684e"/>
      <circle cx="382" cy="21" r="5" fill="#62d19a"/>
      <text x="396" y="27" fill="#d9eee3">Multi-firm signals</text>
    </g>
  </g>

  <g transform="translate(800 95)" filter="url(#shadow)">
    <circle cx="230" cy="225" r="196" fill="#0e1b17" stroke="#315247" stroke-width="2"/>
    <circle cx="230" cy="225" r="142" fill="none" stroke="#315247" stroke-width="2"/>
    <circle cx="230" cy="225" r="88" fill="none" stroke="#315247" stroke-width="2"/>
    <path d="M230 225 388 126A196 196 0 0 1 422 225Z" fill="url(#beam)"/>
    <path d="M230 225 388 126" stroke="#62d19a" stroke-width="5" stroke-linecap="round"/>
    <path d="M230 29V421M34 225H426M91 86 369 364M91 364 369 86" stroke="#315247" stroke-width="1" opacity="0.6"/>
    <circle cx="230" cy="225" r="8" fill="#f4f0e6"/>
    <circle cx="342" cy="155" r="8" fill="#62d19a"/>
    <circle cx="155" cy="135" r="6" fill="#e0b55a"/>
    <circle cx="132" cy="292" r="7" fill="#dc7770"/>

    <g transform="translate(4 382)" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <rect width="452" height="82" rx="12" fill="#f7f5ee"/>
      <text x="22" y="29" fill="#65716b" font-size="11" font-weight="750" letter-spacing="1.4">DAILY ANALYST INTELLIGENCE</text>
      <text x="22" y="57" fill="#14201c" font-size="20" font-weight="700">Agreement and disagreement, made explicit.</text>
    </g>
  </g>

  <g transform="translate(72 576)" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <circle cx="6" cy="-5" r="5" fill="#62d19a"/>
    <text x="20" fill="#a9bbb2" font-size="15">Live dashboard</text>
    <text x="132" fill="#f3f0e7" font-size="15" font-weight="650">analyst-rating-radar.vercel.app</text>
  </g>
</svg>
